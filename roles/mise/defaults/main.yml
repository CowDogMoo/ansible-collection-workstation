---
mise_username: "{{ ansible_facts['user_id'] | default(ansible_facts['user']) }}"
mise_usergroup: "{{ (ansible_facts['os_family'] == 'Darwin') | ternary('staff', mise_username) }}"
mise_user_home: >-
  {{ (ansible_facts['os_family'] == 'Darwin') | ternary(ansible_facts['env']['HOME'],
     (mise_username == 'root') | ternary('/root', '/home/' + mise_username)) }}

mise_bin_dir: "/usr/local/bin"
mise_data_dir: "{{ mise_user_home }}/.local/share/mise"
mise_config_dir: "{{ mise_user_home }}/.config/mise"

mise_shells:
  - "/usr/bin/zsh"
  - "/bin/zsh"
  - "/usr/bin/bash"
  - "/bin/bash"

mise_shell: "{{ '/bin/zsh' if ansible_facts['distribution'] == 'MacOSX' else '/bin/bash' }}"

mise_settings:
  python:
    compile: false
  ruby:
    compile: false

mise_install_default_pkg_files: false
mise_default_pkg_files:
  - src: default-golang-pkgs
    dest: "{{ mise_user_home }}/.default-golang-pkgs"
  - src: default-python-packages
    dest: "{{ mise_user_home }}/.default-python-packages"
  - src: default-ruby-gems
    dest: "{{ mise_user_home }}/.default-gems"

mise_plugins:
  # renovate: datasource=github-tags depName=golang packageName=golang/go extractVersion=^go(?<version>.*)$
  - name: go
    version: "1.26.1"
    scope: "global"
    packages:
      - name: "go:golang.org/x/tools/cmd/goimports"
        version: "latest"
      - name: "go:github.com/goreleaser/goreleaser/v2"
        version: "latest"
      - name: "go:github.com/magefile/mage"
        version: "latest"
      - name: "go:github.com/spf13/cobra-cli"
        version: "latest"
      - name: "go:github.com/dolmen-go/goeval"
        version: "latest"
      - name: "go:golang.org/x/tools/gopls"
        version: "latest"
      - name: "go:golang.org/x/lint/golint"
        version: "latest"
      - name: "go:github.com/cweill/gotests/gotests"
        version: "latest"
      - name: "go:github.com/fatih/gomodifytags"
        version: "latest"
      - name: "go:github.com/josharian/impl"
        version: "latest"
      - name: "go:github.com/go-delve/delve/cmd/dlv"
        version: "latest"
      - name: "go:github.com/fzipp/gocyclo/cmd/gocyclo"
        version: "latest"
      - name: "go:github.com/golangci/golangci-lint/cmd/golangci-lint"
        version: "latest"
      - name: "go:github.com/go-critic/go-critic/cmd/gocritic"
        version: "latest"
      - name: "go:honnef.co/go/tools/cmd/staticcheck"
        version: "latest"
      - name: "go:filippo.io/age/cmd/age"
        version: "latest"
      - name: "go:github.com/getsops/sops/v3/cmd/sops"
        version: "latest"
      - name: "go:github.com/gokcehan/lf"
        version: "latest"
      - name: "go:mvdan.cc/sh/v3/cmd/shfmt"
        version: "latest"
      - name: "go:github.com/terraform-docs/terraform-docs"
        version: "latest"
  # renovate: datasource=github-tags depName=python packageName=python/cpython extractVersion=^v(?<version>.*)$
  - name: python
    version: "3.14.3"
    scope: "global"
    packages:
      - name: "pipx:ansible"
        version: "latest"
      - name: "pipx:ansible-lint"
        version: "latest"
      - name: "pipx:antsibull-changelog"
        version: "latest"
      - name: "pipx:aws-consoler"
        version: "latest"
      - name: "pipx:checkov"
        version: "latest"
      - name: "pipx:mkdocs"
        version: "latest"
      - name: "pipx:molecule"
        version: "latest"
      - name: "pipx:pre-commit"
        version: "latest"
      - name: "pipx:yt-dlp"
        version: "latest"
  # renovate: datasource=ruby-version depName=ruby packageName=ruby/ruby
  - name: ruby
    version: "4.0.2"
    scope: "global"
    packages:
      - name: "gem:mdl"
        version: "latest"
  # renovate: datasource=github-releases depName=helm packageName=helm/helm extractVersion=^v(?<version>.*)$
  - name: helm
    version: "4.1.3"
    scope: "global"
  # renovate: datasource=github-tags depName=kubectl packageName=kubernetes/kubernetes extractVersion=^v(?<version>.*)$
  - name: kubectl
    version: "1.35.3"
    scope: "global"
  # renovate: datasource=github-releases depName=packer packageName=hashicorp/packer extractVersion=^v(?<version>.*)$
  - name: packer
    version: "1.15.0"
    scope: "global"
  # renovate: datasource=github-releases depName=awscli packageName=aws/aws-cli
  - name: awscli
    version: "2.28.22"
    scope: "global"
  # renovate: datasource=node-version depName=node packageName=node
  - name: node
    version: "24.14.0"
    scope: "global"
