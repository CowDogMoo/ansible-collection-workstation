---
- name: Converge
  hosts: all
  vars:
    container_user: "{{ ansible_facts['distribution'] | lower }}"
    container_home: "/home/{{ container_user }}"
  tasks:
    - name: Create test user
      ansible.builtin.user:
        name: "{{ container_user }}"
        shell: /bin/bash
        create_home: true
      become: true

    - name: Set home directory fact  # noqa: var-naming[no-role-prefix]
      ansible.builtin.set_fact:
        ansible_env:
          HOME: "{{ container_home }}"

    - name: Include default variables
      ansible.builtin.include_vars:
        file: "../../defaults/main.yml"

    - name: Include role under test
      ansible.builtin.include_role:
        name: cowdogmoo.workstation.mise
      vars:
        mise_username: "{{ container_user }}"
        mise_plugins:
          - name: go
            version: "1.26.1"
            scope: "global"
          - name: python
            version: "3.14.3"
            scope: "global"
            packages:
              - name: "pipx:ansible"
                version: "latest"
          - name: node
            version: "24.14.0"
            scope: "global"
