---
- name: Check if already installed
  ansible.builtin.command: which agy
  register: antigravity_check
  changed_when: false
  failed_when: false

- name: Download Antigravity CLI installer
  ansible.builtin.get_url:
    url: https://antigravity.google/cli/install.sh
    dest: /tmp/agy-install.sh
    mode: '0755'
  when: antigravity_check.rc != 0

- name: Execute Antigravity CLI installer
  ansible.builtin.command: /tmp/agy-install.sh
  when: antigravity_check.rc != 0
  changed_when: true

- name: Verify installation
  ansible.builtin.command: agy --version
  register: antigravity_version
  changed_when: false
  failed_when: false

- name: Display version
  ansible.builtin.debug:
    msg: "Antigravity installed: {{ antigravity_version.stdout }}"
  when: antigravity_version.rc == 0
