---
ansible_bootstrap_user_home: "{{ ansible_facts['env']['HOME'] }}"

# Where ansible's user-level state lives.
ansible_bootstrap_dir: "{{ ansible_bootstrap_user_home }}/.ansible"
ansible_bootstrap_collections_path: "{{ ansible_bootstrap_dir }}/collections"
ansible_bootstrap_roles_path: "{{ ansible_bootstrap_dir }}/roles"
ansible_bootstrap_fact_cache_path: "{{ ansible_bootstrap_dir }}/fact_cache"
ansible_bootstrap_remote_tmp: "/tmp/.ansible/tmp"

# Per-host log directory used by the community.general.log_plays callback.
ansible_bootstrap_log_folder: "{{ ansible_bootstrap_user_home }}/ansible-logs/hosts"

# Vault password helper. The role installs its bundled helper here and points
# ~/.ansible.cfg at it. Override the path (and set ansible_bootstrap_install_vault_helper
# to false) if you keep the helper elsewhere.
ansible_bootstrap_vault_password_file: "{{ ansible_bootstrap_dir }}/vault-pass.sh"

# Whether to install the bundled vault password helper at the path above.
ansible_bootstrap_install_vault_helper: true

# Whether to write ~/.ansible.cfg. Set false to keep dirs but skip the cfg.
ansible_bootstrap_manage_cfg: true

# Whether to back up an existing ~/.ansible.cfg before overwriting it.
ansible_bootstrap_backup_cfg: true
