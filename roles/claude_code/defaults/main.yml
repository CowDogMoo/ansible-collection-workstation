---
claude_code_username: "{{ ansible_facts['user_id'] | default(ansible_facts['user']) }}"
claude_code_usergroup: "{{ (ansible_facts['os_family'] == 'Darwin') | ternary('staff', claude_code_username) }}"
claude_code_user_home: >-
  {{ (ansible_facts['os_family'] == 'Darwin') | ternary(ansible_facts['env']['HOME'],
     (claude_code_username == 'root') | ternary('/root', '/home/' + claude_code_username)) }}

# Configuration directory for Claude Code
claude_code_config_dir: "{{ claude_code_user_home }}/.claude"

# Homebrew prefix (varies by OS/architecture)
# macOS ARM: /opt/homebrew, macOS Intel: /usr/local, Linux: /home/linuxbrew/.linuxbrew
claude_code_homebrew_prefix: >-
  {{ (ansible_facts['os_family'] == 'Darwin') | ternary(
       (ansible_facts['architecture'] == 'arm64') | ternary('/opt/homebrew', '/usr/local'),
       '/home/linuxbrew/.linuxbrew') }}

# PATH for claude CLI commands
claude_code_path: "{{ claude_code_homebrew_prefix }}/bin:{{ claude_code_user_home }}/.local/bin:/usr/local/bin:/usr/bin:/bin"

# Whether to install Claude Code CLI
claude_code_install: true

# Whether to manage Claude Code settings
claude_code_manage_settings: true

# Whether to backup existing settings before overwriting
claude_code_backup_settings: true

# Simple hooks - easy YAML configuration
claude_code_simple_hooks: []

# Advanced hooks - custom Python/shell scripts
claude_code_advanced_hooks:
  # Hook 1: Block commits/PRs with forbidden content (emojis/branding)
  # Inspects the literal command string. Catches `git commit -m "...Co-Authored-By: Claude..."`
  # and `gh pr create --body "...🤖..."` style invocations. Cannot see content passed via
  # `-F file`, stdin pipes, $variables, or editor commits — Hook 5 handles those post-hoc.
  - event: PreToolUse
    tool: Bash
    type: command
    command: |
      python3 -c "
      import json, sys

      data = json.load(sys.stdin)
      cmd = data.get('tool_input', {}).get('command', '')

      forbidden = [
          '🤖',
          'Generated with',
          'Co-Authored-By: Claude',
          'Co-authored-by: Claude',
          'claude.com/claude-code',
          'noreply@anthropic.com',
      ]

      git_writes = ['git commit', 'git revert', 'git cherry-pick', 'git rebase', 'git merge', 'git tag', 'git notes']
      gh_writes = ['gh pr create', 'gh pr edit', 'gh pr comment', 'gh issue create', 'gh issue edit', 'gh issue comment', 'gh release create', 'gh release edit']

      triggered = next((f for f in forbidden if f in cmd), None)
      op = next((g for g in git_writes + gh_writes if g in cmd), None)

      if triggered and op:
          msg = (
              f'❌ BLOCKED: forbidden content {triggered!r} in {op!r} command.\\n\\n'
              '✅ Use ONLY fabric output:\\n'
              '  Commits: fabric_commit  (or: git diff --staged | fabric --pattern commit)\\n'
              '  PRs:     fabric_pr      (or: git diff main...HEAD | fabric --pattern pr)'
          )
          sys.stderr.write(msg + '\\n')
          sys.exit(2)
      sys.exit(0)
      "

  # Hook 2: Block dangerous git flags that bypass safety checks
  - event: PreToolUse
    tool: Bash
    type: command
    command: |
      python3 -c "
      import json, sys, re

      data = json.load(sys.stdin)
      cmd = data.get('tool_input', {}).get('command', '')

      if 'git' not in cmd:
          sys.exit(0)

      # Check for dangerous flags (long flags use simple 'in', short flags use regex)
      dangerous_long = ['--no-verify', '--no-gpg-sign', '--no-post-rewrite']
      blocked_flag = next((f for f in dangerous_long if f in cmd), None)

      # Check for -n flag as standalone only in git commit commands
      if not blocked_flag and 'git commit' in cmd and re.search(r'(^|\s)-n(\s|$)', cmd):
          blocked_flag = '-n'

      if blocked_flag:
          msg = f'❌ BLOCKED: Cannot use {blocked_flag} flag.\\n\\nThis flag bypasses important safety checks.\\nFix the underlying issues instead.'
          sys.stderr.write(msg + '\\n')
          sys.exit(2)
      sys.exit(0)
      "

  # Hook 3: Post-commit safety net — catches forbidden content that slipped past Hook 1.
  # Hook 1 only sees the literal command string, so it misses messages passed via `-F file`,
  # stdin pipes (`fabric_commit` uses `git commit -F -`), $variables, editor commits, and
  # squash-merges. This runs after any commit-creating command and inspects the resulting
  # commit message. If forbidden content landed, it tells Claude to amend before pushing.
  - event: PostToolUse
    tool: Bash
    type: command
    command: |
      python3 -c "
      import json, sys, subprocess, re, os

      data = json.load(sys.stdin)
      tool_input = data.get('tool_input', {})
      cmd = tool_input.get('command', '')
      cwd = data.get('cwd') or tool_input.get('cwd') or os.getcwd()

      commit_patterns = [
          r'\bgit\s+commit\b',
          r'\bgit\s+revert\b',
          r'\bgit\s+cherry-pick\b',
          r'\bgit\s+rebase\b',
          r'\bgit\s+merge\b',
          r'\bfabric_commit\b',
      ]
      if not any(re.search(p, cmd) for p in commit_patterns):
          sys.exit(0)

      try:
          msg = subprocess.run(
              ['git', '-C', cwd, 'log', '-1', '--format=%B'],
              capture_output=True, text=True, timeout=5, check=True,
          ).stdout
      except Exception:
          sys.exit(0)

      forbidden = [
          '🤖',
          'Generated with',
          'Co-Authored-By: Claude',
          'Co-authored-by: Claude',
          'claude.com/claude-code',
          'noreply@anthropic.com',
      ]
      hits = [f for f in forbidden if f in msg]
      if hits:
          err = (
              f'❌ Last commit contains forbidden content: {hits!r}\\n\\n'
              'Amend it now (do NOT push until fixed):\\n'
              '  git log -1 --format=%B > /tmp/commit_msg\\n'
              '  # edit /tmp/commit_msg and remove the trailers/branding\\n'
              '  git commit --amend -F /tmp/commit_msg\\n'
          )
          sys.stderr.write(err + '\\n')
          sys.exit(2)
      sys.exit(0)
      "

  # Hook 4: Sound notification when Claude finishes a task
  - event: Stop
    tool: ""
    type: command
    command: "osascript -e 'beep 2'"

  # Hook 5: Sound notification when Claude needs input
  - event: Notification
    tool: ""
    type: command
    command: "osascript -e 'beep 1'"

# Additional settings (optional)
claude_code_additional_settings: {}

# MCP Server Management
claude_code_manage_mcp_servers: true  # Whether to manage MCP servers

# List of MCP servers to install
# Each server supports: name, scope, command, args, env, state
claude_code_mcp_servers: []
# Example:
#   - name: chrome-devtools
#     scope: user  # user or project
#     command: npx
#     args:
#       - "-y"
#       - "chrome-devtools-mcp@latest"
#     state: present  # present or absent
