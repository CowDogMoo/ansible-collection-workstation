---
zsh_setup_username: "{{ ansible_facts['user_id'] | default(ansible_facts['user']) | default(ansible_facts['distribution'] | lower) }}"
zsh_setup_usergroup: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else 'Administrators' if ansible_facts['os_family'] == 'Windows' else zsh_setup_username }}"
zsh_setup_shell: "{{ 'powershell' if ansible_facts['os_family'] == 'Windows' else (ansible_facts['env']['SHELL'] | default('/bin/bash')).strip() | regex_replace('\n', '') }}"
zsh_setup_theme: "af-magic"
zsh_setup_plugins:
  - mise
  - aws
  - git
  - docker
  - helm
  - kubectl
  - zsh-completions

# Whether the role owns ~/.zshrc. When true the file is rewritten every run;
# set false on hosts whose ~/.zshrc is owned out-of-band so re-runs don't
# fight with it.
zsh_setup_manage_zshrc: true

# Whether to back up an existing ~/.zshrc before overwriting it.
zsh_setup_backup_zshrc: true

# oh-my-zsh auto-update cadence (days).
zsh_setup_omz_update_frequency: 7

# Whether to install the zsh-completions plugin on first shell startup.
zsh_setup_install_zsh_completions: true

# Default $EDITOR exported from ~/.zshrc.
zsh_setup_editor: "code --wait"

# Optional Android SDK platform-tools path. When non-empty and the directory
# exists at shell start, it's appended to PATH.
zsh_setup_android_sdk_path: "{{ zsh_setup_user_home }}/Library/Android/sdk/platform-tools"

# Whether to source shell-function libraries from disk. Pair with the
# cowdogmoo.workstation.shell_functions role to populate the directory.
zsh_setup_source_shell_functions: true
zsh_setup_shell_functions_dir: "{{ zsh_setup_user_home }}/.dotfiles"

# Whether to run the package_management role to install packages
zsh_setup_install_packages: true
