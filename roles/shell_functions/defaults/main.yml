---
shell_functions_user_home: "{{ ansible_facts['env']['HOME'] }}"

# Destination the dotfiles content is materialized into. The zsh_setup template
# sources every *.sh/*.zsh under this path.
shell_functions_dest: "{{ shell_functions_user_home }}/.dotfiles"

# Optional local checkout to rsync from. When set and the path exists the role
# uses it instead of cloning the remote repo — useful for the maintainer running
# from a working tree.
shell_functions_source_path: ""

# Remote repo cloned when no usable local path is provided. The role ships no
# default repo — the dotfiles source is personal, so supply it from the calling
# playbook (e.g. shell_functions_repo_url: "https://github.com/you/dotfiles.git").
# When both this and shell_functions_source_path are empty the role is a no-op.
shell_functions_repo_url: ""
shell_functions_repo_version: "main"

# Persistent clone location used as the source when no local path is supplied.
# Idempotent re-runs depend on this being stable across plays.
shell_functions_cache_path: "{{ shell_functions_user_home }}/.cache/cowdogmoo/shell_functions"

# Files/directories inside the source that the role copies into the destination.
# Which files exist is specific to the source repo, so the role ships an empty
# list — set this in the calling playbook to the items you want materialized
# (everything else in the source repo is deliberately left behind).
shell_functions_payload: []
