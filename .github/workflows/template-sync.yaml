---
name: Template Sync
on:
  # checkov:skip=CKV_GHA_7: "Workflow dispatch inputs are required for manual debugging"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - '.hooks/**'
      - 'Taskfile.yaml'
      - '.editorconfig'
      - '.github/sync.yml'

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  sync:
    name: Sync infrastructure files to consumer repos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate downstream token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.L50_BOT_APP_ID }}
          private-key: ${{ secrets.L50_BOT_APP_PRIVATE_KEY }}
          owner: l50
          repositories: |
            ansible-collection-arsenal
            ansible-collection-bulwark

      - name: Sync files
        uses: step-security/repo-file-sync-action@25ed98101e502f84b885ff5883bb0b0c14a7b87f # v1.21.3
        with:
          GH_INSTALLATION_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_USERNAME: github-actions[bot]
          COMMIT_PREFIX: "chore:"
          COMMIT_EACH_FILE: false
          PR_LABELS: sync,template,ansible
          PR_BODY: |
            Automated sync of shared infrastructure files from `CowDogMoo/ansible-collection-workstation`.

            Workflow files and `.pre-commit-config.yaml` are owned by Renovate and excluded here.
