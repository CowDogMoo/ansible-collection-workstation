---
# Fabric custom patterns configuration
fabric_install_custom_patterns: true
fabric_custom_patterns_repo: "~/cowdogmoo/fabric-patterns-hub"
fabric_custom_patterns_symlink: true
fabric_update_custom_patterns: true

# MCP Server configuration for Claude Code
claude_code_mcp_servers:
  # Browser automation via Chrome DevTools
  - name: chrome-devtools
    scope: user
    command: npx
    args:
      - "-y"
      - "chrome-devtools-mcp@latest"

  # Grafana integration for dashboards, alerts, and observability
  - name: grafana
    scope: user
    command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/mcp-grafana"
    env:
      GRAFANA_URL: "{{ grafana_url | default('https://grafana.techvomit.xyz') }}"
      GRAFANA_SERVICE_ACCOUNT_TOKEN: "OP_LOOKUP:op://Automation/Grafana Account/api-token"

  # Warpgate for container/AMI image building
  - name: warpgate
    scope: user
    command: "{{ ansible_facts['env']['HOME'] }}/go/bin/warpgate-mcp-server"
    args:
      - stdio

# Override only the bits that differ from the role defaults (see
# roles/claude_code/defaults/main.yml for the full hook map). Keys are merged
# recursively into claude_code_advanced_hooks_default.
claude_code_advanced_hooks_overrides:
  stop_sound:
    command: "afplay \"$HOME/Jobs Done.mp3\""
