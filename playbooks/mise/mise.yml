---
- name: Install mise version manager
  hosts: all
  become: false
  vars:
    mise_cleanup: false
  roles:
    - name: Install mise version manager
      role: cowdogmoo.workstation.mise
      vars:
        mise_plugins: [] # Don't install any plugins by default

    - name: Cleanup mise build artifacts
      role: cowdogmoo.workstation.build_cleanup
      vars:
        build_cleanup_enabled: "{{ mise_cleanup }}"
        build_cleanup_install_path: /usr/local/bin
        build_cleanup_user_home: "{{ mise_user_home | default('/home/' + (mise_username | default(ansible_facts['user_id']))) }}"
        build_cleanup_username: "{{ mise_username | default(ansible_facts['user_id']) }}"
        build_cleanup_keep_binaries:
          - mise
        build_cleanup_protected_packages:
          # Core runtime packages that mise and plugins need
          - ca-certificates
          - curl
          - git
          - sudo
          - unzip
          - libssl3
          - openssl
          - zlib1g
          # Keep core Python3 runtime (but remove dev packages)
          - python3
          - python3-minimal
          - libpython3-stdlib
        build_cleanup_source_directories:
          - yaml-0.2.5
        build_cleanup_paths:
          - /tmp/mise-*
          - /tmp/yaml-*
          - /tmp/install_mise_plugins
          - "{{ mise_user_home | default('/home/' + (mise_username | default(ansible_facts['user_id']))) }}/.cache"
          - /root/.cache
          - /root/.local
          - /tmp/*
          - /var/tmp/*
          - /var/cache/debconf
          - /var/cache/apt/*
          - /usr/include
          - /usr/share/doc
          - /usr/share/man
          - /usr/share/info
        build_cleanup_packages_debian:
          # Build tools and compilers
          - build-essential
          - gcc
          - gcc-*
          - g++
          - g++-*
          - cpp
          - cpp-*
          - make
          - automake
          - autoconf
          - libtool
          - cmake
          - dpkg-dev
          # Python development packages (keep core python3)
          - python3-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - python3-distutils
          - python3-lib2to3
          # Documentation and man pages
          - manpages
          - manpages-dev
        build_cleanup_container_remove_packages:
          # Graphics and LLVM libraries not needed for mise
          - "libllvm*"
          - "llvm*"
          - "libgl*"
          - "mesa*"
        build_cleanup_handle_perl: true
        build_cleanup_handle_systemd: false
        build_cleanup_generate_post_script: true
